<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" overflow="visible">
  <defs>
    <linearGradient id="bodyG" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#7ab8e8"/>
      <stop offset="100%" stop-color="#3a78c0"/>
    </linearGradient>
    <linearGradient id="bodyShadeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a5a9a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a3870" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-6; 0,-2; 0,-5; 0,0"
      keyTimes="0;0.25;0.5;0.75;1"
      dur="3s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate"
      values="0 60 100; -3 60 100; 0 60 100; 3 60 100; 0 60 100"
      keyTimes="0;0.25;0.5;0.75;1"
      dur="3s" repeatCount="indefinite" additive="sum"/>

    <!-- S-curve body -->
    <path d="M60,22 C38,22 26,36 26,50 C26,62 36,70 52,74 L68,78 C82,82 90,88 90,100 C90,114 78,124 60,124 C44,124 32,116 28,104"
      fill="none" stroke="url(#bodyG)" stroke-width="22" stroke-linecap="round"/>
    <path d="M60,22 C38,22 26,36 26,50 C26,62 36,70 52,74 L68,78 C82,82 90,88 90,100 C90,114 78,124 60,124 C44,124 32,116 28,104"
      fill="none" stroke="url(#bodyShadeG)" stroke-width="22" stroke-linecap="round"/>
    <circle cx="60" cy="14" r="6" fill="url(#bodyG)"/>
    <circle cx="60" cy="132" r="6" fill="url(#bodyG)"/>

    <!-- Left arm + glove -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0 33 82; 12 33 82; 0 33 82; -6 33 82; 0 33 82"
        keyTimes="0;0.25;0.5;0.75;1" dur="3s" repeatCount="indefinite"/>
      <path d="M33,82 Q18,86 14,98" fill="none" stroke="#5090c8" stroke-width="8" stroke-linecap="round"/>
      <circle cx="12" cy="102" r="7" fill="#fff"/>
      <circle cx="7" cy="97" r="4" fill="#fff"/>
      <circle cx="17" cy="97" r="4" fill="#fff"/>
    </g>

    <!-- Right arm + glove + briefcase -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0 88 80; -10 88 80; 0 88 80; 8 88 80; 0 88 80"
        keyTimes="0;0.25;0.5;0.75;1" dur="3s" repeatCount="indefinite"/>
      <path d="M88,80 Q102,84 106,95" fill="none" stroke="#5090c8" stroke-width="8" stroke-linecap="round"/>
      <circle cx="108" cy="99" r="7" fill="#fff"/>
      <rect x="97" y="108" width="26" height="20" rx="3" fill="#c8832a" stroke="#9a6020" stroke-width="1.5"/>
      <path d="M104,108 Q110,102 116,108" fill="none" stroke="#9a6020" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="107" y="115" width="6" height="5" rx="1.5" fill="#f0c060" stroke="#9a6020" stroke-width="1"/>
      <line x1="110" y1="108" x2="110" y2="128" stroke="#9a6020" stroke-width="1.2"/>
    </g>

    <!-- Pencil -->
    <g transform="rotate(-40, 55, 24)">
      <rect x="51" y="2" width="6" height="30" rx="2" fill="#f5cc55"/>
      <polygon points="51,32 57,32 54,40" fill="#e8a820"/>
      <polygon points="52.5,37 55.5,37 54,41" fill="#444"/>
      <rect x="51" y="2" width="6" height="5" rx="2" fill="#c05050"/>
    </g>

    <!-- Glasses -->
    <ellipse cx="48" cy="38" rx="10" ry="8" fill="rgba(180,220,255,0.15)" stroke="#1e3a6a" stroke-width="2.2"/>
    <ellipse cx="70" cy="36" rx="10" ry="8" fill="rgba(180,220,255,0.15)" stroke="#1e3a6a" stroke-width="2.2"/>
    <path d="M58,38 Q59,35 60,37" fill="none" stroke="#1e3a6a" stroke-width="2"/>
    <path d="M38,36 Q33,35 31,38" fill="none" stroke="#1e3a6a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M80,34 Q85,33 87,36" fill="none" stroke="#1e3a6a" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Eyes -->
    <ellipse cx="48" cy="38" rx="3.5" ry="4" fill="#1a2840"/>
    <ellipse cx="47" cy="36.5" rx="1.1" ry="1.1" fill="#fff"/>
    <ellipse cx="70" cy="36" rx="3.5" ry="4" fill="#1a2840"/>
    <ellipse cx="69" cy="34.5" rx="1.1" ry="1.1" fill="#fff"/>
    <!-- Blink -->
    <ellipse cx="48" cy="38" rx="3.5" ry="4" fill="#6da8d8">
      <animate attributeName="ry" values="0;0;4;0.2;4;0;0" keyTimes="0;0.4;0.45;0.5;0.55;0.6;1" dur="5s" begin="1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="70" cy="36" rx="3.5" ry="4" fill="#6da8d8">
      <animate attributeName="ry" values="0;0;4;0.2;4;0;0" keyTimes="0;0.4;0.45;0.5;0.55;0.6;1" dur="5s" begin="1.07s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Eyebrows -->
    <path d="M42,31 Q48,28 54,30" fill="none" stroke="#1e3a6a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M64,29 Q70,26 76,28" fill="none" stroke="#1e3a6a" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M50,48 Q59,55 70,50" fill="none" stroke="#1e3a6a" stroke-width="2" stroke-linecap="round"/>

    <!-- Speech bubble -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-4; 0,0" dur="2.2s" repeatCount="indefinite"/>
      <ellipse cx="100" cy="16" rx="17" ry="13" fill="white" stroke="#3a78c0" stroke-width="1.5"/>
      <path d="M88,24 L80,32 L90,27" fill="white" stroke="#3a78c0" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="100" y="22" text-anchor="middle" font-size="15" font-weight="900" fill="#3a78c0" font-family="Arial, sans-serif">?</text>
    </g>

  </g>
</svg>